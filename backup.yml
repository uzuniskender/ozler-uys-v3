name: Günlük Supabase Yedeği

permissions:
  contents: write

on:
  schedule:
    # Her gün UTC 03:00 = Türkiye saati 06:00 (mesai öncesi)
    - cron: '0 3 * * *'
  # Actions sayfasından manuel tetikleme için
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set date variables
        run: |
          echo "BACKUP_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "BACKUP_TIME=$(date -u +'%H:%M UTC')" >> $GITHUB_ENV

      - name: Create backup directory
        run: mkdir -p backups/${{ env.BACKUP_DATE }}

      - name: Dump roles
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" --role-only -f backups/${{ env.BACKUP_DATE }}/roles.sql

      - name: Dump schema
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f backups/${{ env.BACKUP_DATE }}/schema.sql

      - name: Dump data
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" --data-only --use-copy -f backups/${{ env.BACKUP_DATE }}/data.sql

      - name: Check file sizes
        run: ls -lh backups/${{ env.BACKUP_DATE }}/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Yeni yedek yok (commit atılmadı)"
          else
            git commit -m "Yedek $BACKUP_DATE ($BACKUP_TIME)"
            git pull --rebase
            git push
          fi
